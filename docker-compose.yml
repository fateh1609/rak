services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rakoasis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: rakoasis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rakoasis -d rakoasis"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://rakoasis:${POSTGRES_PASSWORD}@db:5432/rakoasis
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      USDT_INR_RATE: ${USDT_INR_RATE:-92}
      SEED_PASSWORD: ${SEED_PASSWORD:-RakOasis@2026}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    # Run migrations + idempotent seed, then start the API
    command: sh -c "node dist/migrate.js && node dist/seed.js && node dist/index.js"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api

volumes:
  pgdata:
